<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="人生体验">
  <meta name="theme-color" content="#1a1a2e">
  <title>人生体验</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <div id="view-today" class="view"></div>
    <div id="view-calendar" class="view hidden"></div>

    <!-- 底部 Tab 栏 -->
    <nav class="tabbar">
      <button class="tab-btn active" data-tab="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        今日
      </button>
      <button class="tab-btn" data-tab="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        日历
      </button>
    </nav>

    <!-- 详情底部弹窗 -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-sheet" class="modal-sheet">
        <div class="modal-handle"></div>
        <div id="modal-content" class="modal-content"></div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="js/ganzhi.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
